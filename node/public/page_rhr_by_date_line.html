<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resting Heart Rate By Date</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <h2><a href="index.html">Home</a> | Resting Heart Rate By Date - Line Chart</h2>

    <label for="start">Start Date:</label>
    <input type="date" id="start">
    <label for="end">End Date:</label>
    <input type="date" id="end">
    <button onclick="loadData()">Load Data</button>

    <div id="rhr_by_date_line" style="width:100%;height:600px;"></div>

    <script>

        window.onload = () => {
            // Set default dates
            let endDate = new Date();
            let startDate = new Date();
            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(0, 0, 0, 0);
            startDate.setDate(endDate.getDate() - 2000);
            document.getElementById('start').valueAsDate = startDate;
            document.getElementById('end').valueAsDate = endDate;
            loadData();  // Initial update to draw all charts based on the default selection
        };

        function loadData() {
            const startDate = document.getElementById('start').value;
            const endDate = document.getElementById('end').value;

            fetch(`http://localhost:3000/api/rhr?start=${startDate}&end=${endDate}`)
                .then(response => response.json())
                .then(data => {
                    //const dates = data.map(item => new Date(item.date));
                    const dates = data.map(item => item.date); // different from datetime bc we just want dates
                    const restingHeartRates = data.map(item => item.restingHeartRate);
                    const dailyAvg = data.map(item => item.dailyAvg);
                    const dailyMax = data.map(item => item.dailyMax);
                    const dailyMin = data.map(item => item.dailyMin);

                    var traces = [
                        {
                            x: dates,
                            y: restingHeartRates,
                            mode: 'lines+markers',
                            type: 'scatter',
                            name: 'Resting Heart Rate',
                            marker: { color: 'black', size: 3 }, 
                        },
                        {
                            name: 'Daily Max',
                            x: dates,
                            y: dailyMax,
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: 'rgba(211, 211, 211, 0.7)' },
                            fill: 'tonexty', // fill to the next trace
                            fillcolor: 'rgba(211, 211, 211, 0.7)',
                            hoverinfo: "text+x+y",
                            text: "Heart Rate Daily Max",
                            hoverlabel: { namelength: -1 },
                        },
                        {
                            // create this trace just to allow min to fill up to it
                            // and allow max trace to have fill wthout overlapping min trace fill
                            name: 'Dummy RHR',
                            x: dates,
                            y: restingHeartRates,
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: 'transparent' },
                            fill: 'tonexty', // fill to the next trace
                            fillcolor: 'transparent',
                            showlegend: false,
                            hoverinfo: 'none',
                        },
                        {
                            name: 'Daily Min',
                            x: dates,
                            y: dailyMin,
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: 'rgba(211, 211, 211, 0.7)' },
                            fill: 'tonexty', // fill to the next trace
                            fillcolor: 'rgba(211, 211, 211, 0.7)', // light pink
                            hoverinfo: "text+x+y",
                            text: "Heart Rate Daily Min",
                            hoverlabel: { namelength: -1 },
                        },
                    ];

                    var layout = {
                        title: 'Resting Heart Rate By Date',
                        xaxis: {
                            title: '',
                            type: 'date',
                            tickfont: { size: 10 },
                            tickformat: "%Y-%m-%d",
                            tickangle: -45,
                            //tickmode: 'array',
                            //tickvals: dates,
                        },
                        yaxis: {
                            title: '',
                            range: [30, 'auto'],
                            tick0: 30,  // This sets the starting tick at 30
                            dtick: 10,  // This sets the ticks to appear every 10 units
                            tickfont: { size: 10 },
                        },
                        legend: {
                            x: 1,
                            xanchor: 'left',
                            y: 1
                        },
                        autosize: true
                    };

                    Plotly.newPlot('rhr_by_date_line', traces, layout);
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    alert('An error occurred while loading the data. Please try again.');
                });
        }
    </script>

</body>

</html>
