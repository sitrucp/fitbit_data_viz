<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resting Heart Rate By Date</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <h2><a href="index.html">Home</a> | Resting Heart Rate By Date - Line Chart</h2>

    <label for="start">Start Date:</label>
    <input type="date" id="start">
    <label for="end">End Date:</label>
    <input type="date" id="end">
    <button onclick="loadData()">Load Data</button>

    <div id="rhr_by_date" style="width:100%;height:600px;"></div>

    <script>

        window.onload = () => {
            // Set default dates
            let endDate = new Date();
            let startDate = new Date();
            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(0, 0, 0, 0);
            startDate.setDate(endDate.getDate()-2000);
            document.getElementById('start').valueAsDate = startDate;
            document.getElementById('end').valueAsDate = endDate;
            loadData();  // Initial update to draw all charts based on the default selection
        };

        function loadData() {
            const startDate = document.getElementById('start').value;
            const endDate = document.getElementById('end').value;

            fetch(`http://localhost:3000/api/rhr?start=${startDate}&end=${endDate}`)
                .then(response => response.json())
                .then(data => {
                    //const dates = data.map(item => new Date(item.date));
                    const dates = data.map(item => item.date); // different from datetime bc we just want dates
                    const restingHeartRates = data.map(item => item.restingHeartRate);

                    var traces = [{
                        x: dates,
                        y: restingHeartRates,
                        mode: 'lines+markers',
                        type: 'scatter',
                        name: 'Resting Heart Rate',
                        marker: { color: 'rgba(255, 99, 132, 1)', size: 3 }, // pink
                    }];

                    var layout = {
                        title: 'Resting Heart Rate By Date',
                        xaxis: {
                            title: '', 
                            type: 'date',
                            tickfont: { size: 10 },
                            tickformat: "%Y-%m-%d", 
                            tickangle: -45,
                            //tickmode: 'array',
                            //tickvals: dates,
                        },
                        yaxis: {
                            title: '', 
                            range: ['auto', 'auto'],
                            tickfont: { size: 10 },
                        },
                        legend: {
                            x: 1,
                            xanchor: 'left',
                            y: 1
                        },
                        autosize: true
                    };

                    Plotly.newPlot('rhr_by_date', traces, layout);
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    alert('An error occurred while loading the data. Please try again.');
                });
        }
    </script>

</body>

</html>
