<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Rate By Date</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <p><a href="index.html">Home</a></p>

    <h2>Heart Rate By Date</h2>
    
    <label for="days">Enter number of days:</label>
    <input type="number" id="days" value="1" min="1" max="1000">
    <button onclick="loadData()">Load Data</button>
    
    <div id="hr_by_date" style="width:100%;height:600px;"></div>
  
    <script>

                window.onload = () => {
            loadData();  // Initial update to draw all charts based on the default selection
        };
        function loadData() {
    const days = document.getElementById('days').value;
    fetch(`http://localhost:3000/api/hr?days=${days}`)
        .then(response => response.json())
        .then(data => {
            const dates = data.map(item => new Date(item.dateTime));
            const heartRates = data.map(item => item.heartRate);
            const restingHeartRates = data.map(item => item.restingHeartRate);
           
            var trace1 = {
                x: dates,
                y: heartRates,
                mode: 'lines+markers',
                type: 'scatter',
                name: 'Heart Rate',
                marker: { color: 'rgba(255, 99, 132, 1)' },
            };

            var trace2 = {
                x: dates,
                y: restingHeartRates,
                mode: 'lines',
                type: 'scatter',
                name: 'Resting Heart Rate',
                marker: { color: 'rgba(54, 162, 235, 1)' },
            };

            var layout = {
                title: 'Heart Rate By Date',
                xaxis: {
                    title: '', // Consider removing if not necessary
                    type: 'date',
                    tickfont: { size: 10 },
                },
                yaxis: {
                    title: '', // Consider removing if not necessary
                    range: ['auto', 'auto'],
                    tickfont: { size: 10 },
                },
                margin: { // Reduce margin
                    l: 40,
                    r: 40,
                    b: 40,
                    t: 40, // Smaller top margin if the title is removed
                    pad: 4
                },
                legend: {
                    x: 1,
                    xanchor: 'right',
                    y: 1
                },
                autosize: true
            };

            Plotly.newPlot('hr_by_date', [trace1, trace2], layout);
        })
        .catch(error => {
            console.error('Error loading data:', error);
            alert('An error occurred while loading the data. Please try again.');
        });
}
    </script>

</body>
</html>
