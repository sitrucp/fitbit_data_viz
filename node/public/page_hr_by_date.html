<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Heart Rate By Date</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <p><a href="index.html">Home</a></p>

    <h2>Heart Rate By Date - Scatter Chart With Range Colors</h2>

    <label for="start">Start Date:</label>
    <input type="date" id="start">
    <label for="end">End Date:</label>
    <input type="date" id="end">
    <button onclick="loadData()">Load Data</button>

    <div id="hr_by_date" style="width:100%;height:600px;"></div>

    <script>

        window.onload = () => {
            // Set default dates
            let endDate = new Date();
            let startDate = new Date();
            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(0, 0, 0, 0);
            document.getElementById('start').valueAsDate = startDate;
            document.getElementById('end').valueAsDate = endDate;
            loadData();  // Initial update to draw all charts based on the default selection
        };

        function loadData() {
            const startDate = document.getElementById('start').value;
            const endDate = document.getElementById('end').value;

            fetch(`http://localhost:3000/api/hr?start=${startDate}&end=${endDate}`)
                .then(response => response.json())
                .then(data => {
                    const dates = data.map(item => new Date(item.dateTime));
                    const heartRates = data.map(item => item.heartRate);
                    const restingHeartRates = data.map(item => item.restingHeartRate);
                    const age = 58;
                    const restingHeartRate = 53;
                    const maxHeartRate = 220 - age;
                    const heartRateReserve = maxHeartRate - restingHeartRate;

                    // Calculate zone thresholds based on Heart Rate Reserve (HRR)
                    const zone1UpperLimit = restingHeartRate + heartRateReserve * 0.5;
                    const zone2UpperLimit = restingHeartRate + heartRateReserve * 0.65;
                    const zone3UpperLimit = restingHeartRate + heartRateReserve * 0.75;
                    const zone4UpperLimit = restingHeartRate + heartRateReserve * 0.9;

                    // Calculate colors for each heart rate based on dynamically calculated zones
                    const heartRateColors = heartRates.map(rate => {
                        if (rate < zone1UpperLimit) return 'rgb(0, 128, 128)';      // Normal
                        else if (rate < zone2UpperLimit) return 'rgb(252, 191, 73)'; // Fat Burn
                        else if (rate < zone3UpperLimit) return 'rgb(247, 127, 0)';   // Cardio
                        else return 'rgb(214, 40, 40)';                             // Peak
                    });

                    var trace1 = {
                        x: dates,
                        y: heartRates,
                        mode: 'markers',
                        type: 'scatter',
                        name: 'Heart Rate',
                        marker: { color: heartRateColors, size: 5 },
                    };

                    var trace2 = {
                        x: dates,
                        y: restingHeartRates,
                        mode: 'lines',
                        type: 'scatter',
                        name: 'Resting Heart Rate',
                        marker: { color: 'rgba(255, 99, 132, 1)', size: 3 }, // pink
                    };

                    var layout = {
                        title: 'Heart Rate By Date',
                        xaxis: {
                            title: '', // Consider removing if not necessary
                            type: 'date',
                            tickfont: { size: 10 },
                        },
                        yaxis: {
                            title: '', // Consider removing if not necessary
                            range: ['auto', 'auto'],
                            tickfont: { size: 10 },
                        },
                        margin: { // Reduce margin
                            l: 40,
                            r: 40,
                            b: 40,
                            t: 40, // Smaller top margin if the title is removed
                            pad: 4
                        },
                        legend: {
                            x: 1,
                            xanchor: 'left',
                            y: 1
                        },
                        autosize: true
                    };

                    Plotly.newPlot('hr_by_date', [trace1, trace2], layout);
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    alert('An error occurred while loading the data. Please try again.');
                });
        }
    </script>

</body>

</html>
