<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SpO2 By Date Scatter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <h2><a href="index.html">Home</a> | Spo2 By Date - Daily Average Line Chart (PW2 > 2024-04-05)</h2>

    <label for="start">Start Date:</label>
    <input type="date" id="start">
    <label for="end">End Date:</label>
    <input type="date" id="end">
    <button onclick="loadData()">Load Data</button>

    <div id="spo2_by_date_line" style="width:100%;height:600px;"></div>

    <script>
        window.onload = () => {
            // Set default dates
            let endDate = new Date();
            let startDate = new Date();
            startDate.setDate(endDate.getDate() - 365); // set start x days earlier than today
            endDate.setHours(0, 0, 0, 0);
            document.getElementById('start').valueAsDate = startDate;
            document.getElementById('end').valueAsDate = endDate;
            loadData();  // Initial update to draw all charts based on the default selection
        };

        function loadData() {
            const startDate = document.getElementById('start').value;
            const endDate = document.getElementById('end').value;

            fetch(`http://localhost:3000/api/spo2_daily?start=${startDate}&end=${endDate}`)
                .then(response => response.json())
                .then(data => {
                    const dates = data.map(item => new Date(item.date));
                    const dailyAvg = data.map(item => item.dailyAvg);
                    const dailyMax = data.map(item => item.dailyMax);
                    const dailyMin = data.map(item => item.dailyMin);

                    var traces = [
                        {
                            name: 'Daily Avg',
                            x: dates,
                            y: dailyAvg,
                            type: 'scatter',
                            mode: 'lines',
                            line: {
                                color: 'black', // pink 'rgba(255, 99, 132, 1)'
                            },
                            hoverinfo: "text+x+y",
                            text: "Daily Avg",
                            hoverlabel: {namelength :-1},
                        },
                        {
                            name: 'Daily Max',
                            x: dates,
                            y: dailyMax,
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: 'rgba(211, 211, 211, 0.7)' },
                            fill: 'tonexty', // fill to the next trace
                            fillcolor: 'rgba(211, 211, 211, 0.7)',
                            hoverinfo: "text+x+y",
                            text: "Daily Max",
                            hoverlabel: {namelength :-1},
                        }, {
                            // create this trace just to allow min to fill up to it
                            // and allow max trace to have fill wthout overlapping min trace fill
                            name: 'Dummy Avg',
                            x: dates,
                            y: dailyAvg,
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: 'transparent' },
                            fill: 'tonexty', // fill to the next trace
                            fillcolor: 'transparent',
                            showlegend: false,
                            hoverinfo: 'none',
                        }, {
                            name: 'Daily Min',
                            x: dates,
                            y: dailyMin,
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: 'rgba(211, 211, 211, 0.7)' },
                            fill: 'tonexty', // fill to the next trace
                            fillcolor: 'rgba(211, 211, 211, 0.7)', // light pink
                            hoverinfo: "text+x+y",
                            text: "Daily Min",
                            hoverlabel: {namelength :-1},
                        },
                        {
                            x: [null], // No actual data points
                            y: [null],
                            mode: "lines",
                            type: "scatter",
                            name: "SpO2 95% Goal",
                            line: {
                                color: 'rgba(255, 99, 132, 1)', // pink
                                dash: 'dashdot',
                            },
                            showlegend: true,
                        },
                    ];

                    var layout = {
                        title: 'SpO2 Daily Average',
                        xaxis: {
                            title: '',
                            type: 'date',
                            tickfont: { size: 10 },
                            tickformat: "%Y-%m-%d",
                            tickangle: -45,
                        },
                        yaxis: {
                            title: '',
                            range: ['auto', 'auto'],
                            tick0: 70,  // This sets the starting tick at x
                            dtick: 1,  // This sets the ticks to appear every x units
                        },
                        legend: {
                            x: 1,
                            xanchor: 'left',
                            y: 1
                        },
                        autosize: true,
                        shapes: [
                            {
                                type: 'line',
                                x0: dates[1],
                                x1: dates[dates.length - 1],
                                y0: 95,
                                y1: 95,
                                line: {
                                    color: 'rgba(255, 99, 132, 1)', // pink
                                    dash: 'dashdot',
                            },
                            },

                        ]
                    };

                    Plotly.newPlot('spo2_by_date_line', traces, layout);
                })
                .catch(error => console.error('Error loading data:', error));
        }
    </script>
</body>

</html>
