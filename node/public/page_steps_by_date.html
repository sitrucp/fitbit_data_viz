<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Steps By Date Bar</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <p><a href="index.html">Home</a></p>

    <h2>Steps By Date - Bar Chart</h2>

    <label for="start">Start Date:</label>
    <input type="date" id="start">
    <label for="end">End Date:</label>
    <input type="date" id="end">
    <button onclick="loadData()">Load Data</button>

    <div id="steps_by_date_bar" style="width:100%;height:600px;"></div>

    <script>
        window.onload = () => {
            // Set default dates
            let endDate = new Date();
            let startDate = new Date();
            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(0, 0, 0, 0);
            startDate.setDate(endDate.getDate() - 120); // set start x days earlier than today
            document.getElementById('start').valueAsDate = startDate;
            document.getElementById('end').valueAsDate = endDate;
            loadData();  // Initial update to draw all charts based on the default selection
        };

        function loadData() {
            const startDate = document.getElementById('start').value;
            const endDate = document.getElementById('end').value;
            
            // Fetch data from your API
            fetch(`http://localhost:3000/api/steps?start=${startDate}&end=${endDate}`)
                .then(response => response.json())
                .then(data => {
                    const dates = data.map(item => new Date(item.dateTime));
                    const steps = data.map(item => item.steps === 0 ? null : item.steps); 
                    const cumulativeSteps = data.map(item => item.cumulativeSteps === 0 ? null : item.cumulativeSteps); 

                    // Prepare traces for the Plotly chart
                    const traceSteps = {
                        x: dates,
                        y: steps,
                        type: 'bar',
                        name: 'Hourly Steps',
                        marker: {
                            color: '#008080'  // Teal for steps
                        },
                        width: 3600000 * 0.9 // 90% of an hour in milliseconds
                    };

                    const traceCumulativeSteps = {
                        x: dates,
                        y: cumulativeSteps,
                        type: 'scatter',
                        mode: 'lines',
                        name: 'Cumulative Steps',
                        line: {
                            color: '#FCBF49'  // Orange for cumulative steps
                        }
                    };

                    const layout = {
                        title: 'Steps By Date',
                        xaxis: {
                            title: 'Date',
                            type: 'date',
                            tickformat: '%Y-%m-%d %H',
                            tickangle: -45,
                        },
                        yaxis: {
                            title: 'Steps'
                        },
                        legend: {
                            orientation: 'h',
                            x: 0,
                            y: 1.1
                        },
                        shapes: [
                            {
                                type: 'line',
                                xref: 'paper',
                                x0: 0,
                                y0: 10000,
                                x1: 1,
                                y1: 10000,
                                line: {
                                    color: '#FF5151',
                                    width: 2,
                                    dash: 'dashdot'
                                }
                            }
                        ]
                    };

                    Plotly.newPlot('steps_by_date_bar', [traceSteps, traceCumulativeSteps,], layout);
                })
                .catch(error => console.error('Error loading data:', error));
        }

    </script>
</body>

</html>
