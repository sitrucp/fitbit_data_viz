<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SpO2 By Date Scatter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <p><a href="index.html">Home</a></p>

    <h2>Spo2 By Date - Scatter Chart</h2>

    <label for="start">Start Date:</label>
    <input type="date" id="start">
    <label for="end">End Date:</label>
    <input type="date" id="end">
    <button onclick="loadData()">Load Data</button>
    
    <div id="spo2_by_date_scatter" style="width:100%;height:600px;"></div>

    <script>
        window.onload = () => {
            // Set default dates
            let endDate = new Date();
            let startDate = new Date();
            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(0, 0, 0, 0);
            document.getElementById('start').valueAsDate = startDate;
            document.getElementById('end').valueAsDate = endDate;
            loadData();  // Initial update to draw all charts based on the default selection
        };

        function loadData() {
            const startDate = document.getElementById('start').value;
            const endDate = document.getElementById('end').value;

            fetch(`http://localhost:3000/api/spo2?start=${startDate}&end=${endDate}`)
                .then(response => response.json())
                .then(data => {
                    const dates = data.map(item => new Date(item.dateTime));
                    const spo2 = data.map(item => item.spo2);
                    const daily_averages = data.map(item => item.dailyAverage);

                    var traces = [{
                        x: dates,
                        y: spo2,
                        mode: 'markers',
                        type: 'scatter',
                        name: 'SpO2',
                        marker: {   
                            color: 'black',
                            size: 5 
                        }
                    }, {
                        x: dates,
                        y: daily_averages,
                        mode: 'lines',
                        type: 'scatter',
                        name: 'Daily Average',
                        line: {
                            color: 'rgba(255, 99, 132, 1)', // pink
                        }
                    }];

                    var layout = {
                        title: 'SpO2 By Date',
                        xaxis: {
                            title: 'Date and Time',
                            type: 'date'
                        },
                        yaxis: {
                            title: '',
                            range: ['auto','auto']
                        },
                        margin: {
                            l: 40,
                            r: 40,
                            b: 40,
                            t: 40,
                            pad: 4
                        },
                        legend: {
                            x: 1,
                            xanchor: 'left',
                            y: 1
                        },
                        autosize: true,
                        shapes: [
                            {
                                type: 'line',
                                x0: dates[0],
                                x1: dates[dates.length - 1],
                                y0: 95,
                                y1: 95,
                                line: {
                                    color: 'red',
                                    width: 2,
                                    dash: 'dash'
                                }
                            }
                        ]
                    };

                    Plotly.newPlot('spo2_by_date_scatter', traces, layout);
                })
                .catch(error => console.error('Error loading data:', error));
        }
    </script>
</body>

</html>
