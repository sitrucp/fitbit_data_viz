<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Multiple Charts Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/scichart/index.min.js" crossorigin="anonymous"></script>


    <style>
        .chart-container {
            width: 99%;
            height: 200px;
            padding: 0;
            margin: 10px;
            border: 1px solid black; 
        }
    </style>

</head>

<body>
    <h2>Fitbit Data Visualizations - Single page | <a href="index.html">Large charts</a></h2>
    <label for="days">Enter number of days:</label>
    <input type="number" id="days" value="1" min="1" max="1000">
    <button onclick="updateCharts()">Load Data</button>

    <div id="hr_by_date" class="chart-container"></div>
    <div id="spo2_by_date_scatter" class="chart-container"></div>
    <div id="hrv_by_date_scatter" class="chart-container"></div>
    <div id="spo2_by_date_bar" class="chart-container"></div>
    <div id="br_by_date_scatter" class="chart-container"></div>
    <div id="sleeplog_by_date_bar" class="chart-container"></div>
    <div id="hrv_by_date_area" class="chart-container"></div>
    
    <script src="js/br_by_date.js"></script>
    <script src="js/hr_by_date.js"></script>
    <script src="js/hrv_by_date_area.js"></script>
    <script src="js/hrv_by_date_scatter.js"></script>
    <script src="js/spo2_by_date_bar.js"></script>
    <script src="js/spo2_by_date_scatter.js"></script>
    <script src="js/sleeplog_by_date_bar.js"></script>
    <script src="js/update_charts.js"></script>
</body>

</html>
