<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRV (RMSSD) By Date Scatter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <p><a href="index.html">Home</a></p>
    <h2>HRV By Date - Scatter</h2>
    <label for="days">Enter number of days:</label>
    <input type="number" id="days" value="1" min="1" max="1000">
    <button onclick="loadData()">Load Data</button>
    <div id="hrv_by_date_scatter" style="width:100%;height:600px;"></div>

    <script>

window.onload = () => {
            loadData();  // Initial update to draw all charts based on the default selection
        };
        function loadData() {
            const days = document.getElementById('days').value;
            fetch(`http://localhost:3000/api/hrv?days=${days}`)
                .then(response => response.json())
                .then(data => {
                    const dates = data.map(item => new Date(item.dateTime));
                    const rmssd = data.map(item => item.rmssd);
                    const dailyAverageRmssd = data.map(item => item.dailyAverageRmssd);
              
                    var traces = [
                    {
                        x: dates,
                        y: rmssd,
                        mode: 'markers',
                        connectgaps: false, // only works if x axis is datetime values not strings
                        type: 'scatter',
                        name: 'Individual RMSSD Values',
                        marker: {
                            color: 'black'
                        }
                    }, {
                        x: dates,
                        y: dailyAverageRmssd,
                        mode: 'lines',
                        type: 'scatter',
                        name: 'Daily Average',
                        line: {
                            color: 'rgba(255, 99, 132, 1)', // pink
                        }
                    }];

                    var layout = {
                        title: 'HRV (RMSSD) By Date',
                        xaxis: {
                            title: 'Date and Time',
                            type: 'date'
                        },
                        yaxis: {
                            title: 'RMSSD',
                            range: ['auto', 'auto'],
                        }
                    };

                    Plotly.newPlot('hrv_by_date_scatter', traces, layout);
                })
                .catch(error => console.error('Error loading data:', error));
        }
    </script>
</body>
</html>
